                "acceptedAnswer": {

            {
                "@type": "Question",
                "name": "Where are you located?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Our head office is located at 1st Floor, Vijay Chambers, opposite Dreamland Cinema, Grant Road, Mumbai, Maharashtra 400004. We supply parts across India and also support export requirements upon request."
                }
            },
            {
                "@type": "Question",
                "name": "How long have you been in business?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "We've been operational since 1956 with over 70 years of expertise in heavy equipment and commercial vehicle spares."
                }
            },
            {
                "@type": "Question",
                "name": "Do you supply spare parts for all major truck and equipment brands?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Yes. We stock and supply spare parts compatible with leading global brands like Volvo, Scania, Mercedes, Bharat Benz, Komatsu, Caterpillar, Hitachi, Hyundai, Kobelco, and JCB, with over 5,000 parts available."
                }
            },
            {
                "@type": "Question",
                "name": "Do you offer both OEM and aftermarket parts?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Yes. We provide genuine OEM parts and top-grade aftermarket alternatives sourced from trusted international manufacturers. All parts are tested for performance and reliability."
                }
            },
            {
                "@type": "Question",
                "name": "Are the parts available in ready stock?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Over 90% of our catalog is available in ready stock, ensuring prompt dispatch and minimal equipment downtime."
                }
            },
            {
                "@type": "Question",
                "name": "Can you help source rare or discontinued parts?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Yes. We specialize in locating hard-to-find and discontinued components through our global supplier network."
                }
            },
            {
                "@type": "Question",
                "name": "How can I request a quote?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "Share your part number, description, or equipment model via phone (+91 98210 37990), email (parts@partstrading.com), or the contact form on our website."
                }
            },
            {
                "@type": "Question",
                "name": "Do you offer delivery across India?",

                    "@type": "Answer",
