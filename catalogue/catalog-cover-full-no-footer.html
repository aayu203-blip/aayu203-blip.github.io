<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PTC Catalogue - Global Parts Edition (Full Image - No Footer)</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- PRINT SETTINGS --- */
        @page {
            size: A4;
            margin: 0;
            margin-bottom: 5mm;
        }
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background: none;
            }
            .cover-container {
                box-shadow: none;
                width: 100%;
                height: 100%;
                margin: 0;
            }
        }
        /* --- GLOBAL VARS --- */
        :root {
            --ptc-gold: #FFC20E;
            --dark-bg: #000000;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #555;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            align-items: center;
        }
        /* A4 Container (210mm x 297mm) */
        .cover-container {
            width: 210mm; 
            height: 297mm;
            background-color: #000000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            padding-top: 5mm;
            padding-bottom: 5mm;
        }
        /* --- FULL PAGE IMAGE BACKGROUND (Extends to bottom) --- */
        .full-page-image {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0; /* Extended to bottom - no footer */
            background-image: url('/catalogue-2025/images/PTC-BG2.png');
            background-size: cover; /* Original zoom level - no zoom in/out */
            background-position: right top;
            background-repeat: no-repeat;
            z-index: 1;
        }
        /* --- TEXTURE & EFFECTS --- */
        .texture-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0; /* Extended to bottom */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 50;
            mix-blend-mode: overlay;
        }
        /* --- LAYOUT SECTIONS --- */
        /* Header - Now transparent/overlay on image */
        .top-bar {
            background: none !important; /* Absolutely no background */
            padding: 0.8mm 12mm 0.8mm 12mm;
            padding-top: 31px;
            height: 125px;
            min-height: 125px;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            border-bottom: none;
            position: relative;
            box-shadow: none !important; /* No shadows */
            opacity: 1 !important; /* Full opacity */
        }
        .user-logo-placeholder {
            margin: 0;
            margin-top: 0;
            margin-bottom: 0;
            padding: 0;
            display: block;
            line-height: 0;
        }
        .logo-image {
            height: 24mm;
            width: auto;
            max-width: 50mm;
            object-fit: contain;
            object-position: center top;
            filter: drop-shadow(0 5px 10px rgba(255, 194, 14, 0.25));
            margin: 0;
            margin-bottom: 0;
            padding: 0;
            display: block;
            position: relative;
            top: 12px;
            transform: scale(1.1025); /* 5% bigger (1.05 * 1.05 = 1.1025) */
        }
        /* Heritage Block - Top Right Corner */
        .heritage-block {
            position: absolute;
            top: 31px;
            right: 52px;
            z-index: 35;
            text-align: right;
            max-width: 240px;
        }
        .heritage-block .heritage-line {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 30px;
            color: rgba(255, 255, 255, 0.95); /* Slightly brighter for contrast on image */
            letter-spacing: -0.8px;
            line-height: 0.9;
            margin: 0;
            padding: 0;
            display: block;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.8), 0 1px 3px rgba(0, 0, 0, 0.9); /* Stronger shadow for readability */
        }
        .heritage-block .heritage-gold {
            color: rgba(255, 255, 255, 0.95);
        }
        .heritage-block .heritage-subtitle {
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            font-size: 13px;
            color: var(--ptc-gold);
            letter-spacing: 3px;
            line-height: 1.2;
            margin: 0;
            margin-top: 4px;
            padding: 0;
            display: block;
            text-transform: none;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.8), 0 1px 3px rgba(0, 0, 0, 0.9); /* Stronger shadow for readability */
        }
        /* Fade overlays for text readability */
        .fade-overlay-top {
            display: none; /* Completely remove to keep header area consistent */
        }
        .fade-overlay-left {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0; /* Extended to bottom */
            width: 45%;
            background: linear-gradient(
                to right,
                rgba(0, 0, 0, 0.75) 0%,
                rgba(0, 0, 0, 0.5) 40%,
                rgba(0, 0, 0, 0.25) 60%,
                transparent 80%
            );
            z-index: 3;
            pointer-events: none;
        }
        .fade-overlay-bottom {
            position: absolute;
            bottom: 0; /* Extended to bottom */
            left: 0;
            right: 0;
            height: 80mm; /* Cover bottom area for bottom section */
            background: linear-gradient(
                to top,
                rgba(0, 0, 0, 0.8) 0%,
                rgba(0, 0, 0, 0.5) 30%,
                rgba(0, 0, 0, 0.2) 60%,
                transparent 100%
            );
            z-index: 4;
            pointer-events: none;
        }
        /* Tech Grid overlay */
        .tech-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0; /* Extended to bottom */
            background-size: 42px 42px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            pointer-events: none;
            z-index: 16;
            opacity: 0.07;
            mix-blend-mode: normal;
        }
        /* Hero Content - Slogan */
        .hero-content {
            position: absolute;
            bottom: 150mm; /* Nudged up slightly to clear hydraulic arm */
            left: 0;
            right: 0;
            z-index: 20;
            padding: 133px 10mm 20mm calc(18mm + 30px - 10.5mm); /* Moved left by 5% (10.5mm) */
            margin-top: 0;
        }
        /* Typography & Layout elements */
        .gold-border {
            border-left: 10px solid var(--ptc-gold); /* Increased by 25% from 8px to 10px */
            padding-left: 18px;
            display: inline-block;
            margin-bottom: 16px;
            height: fit-content;
        }
        .headline {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            color: #fff;
            font-size: 44px;
            line-height: 0.91;
            margin: 0;
            letter-spacing: -0.01em;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6); /* Add shadow for readability on image */
        }
        .headline .gold { 
            color: var(--ptc-gold); 
        }
        /* Bottom Section - Centered tagline and website */
        .bottom-section {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15mm 20mm;
            z-index: 30;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .bottom-tagline {
            font-family: 'Inter', sans-serif;
            font-size: 13px; /* Increased by 1pt from 12px */
            font-weight: 700; /* Bold */
            color: #ffffff;
            line-height: 1.4;
            letter-spacing: 0.05em; /* Premium letter spacing (+50 tracking) */
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            margin: 0;
        }
        .bottom-website {
            font-family: 'Inter', sans-serif;
            font-size: 12px; /* Increased by 1pt from 11px, 1pt smaller than tagline */
            font-weight: 400; /* Regular/thin */
            color: #ffffff;
            line-height: 1.4;
            letter-spacing: 0.05em; /* Premium letter spacing (+50 tracking) */
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="cover-container">
        <!-- Full Page Image Background (covers entire page) -->
        <div class="full-page-image"></div>
        
        <!-- Fade Overlays for Text Readability -->
        <div class="fade-overlay-left"></div>
        <div class="fade-overlay-bottom"></div>
        
        <!-- Textures -->
        <div class="texture-overlay"></div>
        <div class="tech-grid"></div>
        
        <!-- TOP BAR -->
        <div class="top-bar">
            <div style="display: flex; flex-direction: column; align-items: flex-start; margin-left: calc(48px - 28px); gap: 0; position: relative;">
                <div class="user-logo-placeholder">
                    <img src="/catalogue-2025/images/logos/ptc-logo.png" alt="PTC Parts Trading Company" class="logo-image">
                </div>
            </div>
            <!-- Heritage Block - Top Right (Compact Badge) -->
            <div class="heritage-block">
                <div class="heritage-line">HEAVY DUTY</div>
                <div class="heritage-line">LEGACY<span class="heritage-gold">.</span></div>
                <div class="heritage-subtitle">Since 1956</div>
            </div>
        </div>

        <!-- HERO CONTENT - Slogan -->
        <div class="hero-content">
            <div class="gold-border">
                <h2 class="headline">
                    IF YOU HAVE<br>
                    <span class="gold">EARTHMOVERS</span>,<br>
                    WE HAVE<br>
                    <span class="gold">PARTS.</span>
                </h2>
            </div>
        </div>

        <!-- BOTTOM SECTION - Centered tagline and website -->
        <div class="bottom-section">
            <div class="bottom-tagline">Supporting the world's leading heavy machinery brands since 1956.</div>
            <div class="bottom-website">www.partstrading.com</div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
