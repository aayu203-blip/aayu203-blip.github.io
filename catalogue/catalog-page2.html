<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PTC Catalogue - Power & Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@500;600;700;900&display=swap" rel="stylesheet">
    <style>
        @page { size: A4; margin: 0; }
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: none; }
            .page-container { box-shadow: none; width: 100%; height: 100%; margin: 0; }
        }
        :root {
            --ptc-gold: #FFC20E;
            --dark-bg: #000000;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #555;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            align-items: center;
        }
        /* A4 Container - EXACT 210mm x 297mm */
        .page-container {
            width: 210mm; 
            height: 297mm;
            background-color: #000000;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        /* Yellow Strip on Left Edge */
        .yellow-strip {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4mm;
            background: var(--ptc-gold);
            z-index: 10;
        }
        /* Textures */
        .texture-overlay {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 50;
            mix-blend-mode: overlay;
        }
        .tech-grid {
            position: absolute;
            inset: 0;
            background-size: 42px 42px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            pointer-events: none;
            z-index: 16;
            opacity: 0.07;
        }
        /* Safe Zone - 15mm from edges */
        .safe-zone {
            position: absolute;
            top: 15mm;
            left: 19mm; /* 15mm + 4mm yellow strip */
            right: 15mm;
            bottom: 15mm;
            z-index: 100;
        }
        /* Section A: Engine Systems - Top 55% */
        .section-a {
            position: absolute;
            top: 15mm;
            left: 19mm;
            right: 15mm;
            height: 148.35mm; /* 55% of 297mm - 30mm (top/bottom safe zones) = 55% of 267mm = ~147mm */
            z-index: 100;
        }
        /* Section A Header */
        .section-a-header {
            font-family: 'Oswald', sans-serif;
            font-weight: 900;
            font-size: 68px;
            color: var(--ptc-gold);
            line-height: 0.9;
            margin-bottom: 12mm;
            text-transform: uppercase;
            letter-spacing: -0.01em;
        }
        /* Brand Wall Grid - 2 rows x 3 columns */
        .brand-wall-3col {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12mm 15mm;
            margin-bottom: 8mm;
        }
        /* Logo Container */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05); /* Subtle white background */
            padding: 8mm 6mm;
            border-radius: 2px;
            min-height: 25mm;
        }
        .logo-item-large {
            max-width: 100%;
            max-height: 18mm;
            width: auto;
            height: auto;
            object-fit: contain;
            filter: brightness(0) invert(1); /* White logos */
        }
        /* Parts List - Small Text */
        .parts-list {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.05em;
            margin-top: 4mm;
        }
        /* Product Visual - Bottom Right */
        .product-visual {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 45%;
            height: auto;
            max-height: 60mm;
            object-fit: contain;
            opacity: 0.85;
            z-index: 5; /* Behind logos */
        }
        /* Yellow Divider Line */
        .yellow-divider {
            position: absolute;
            top: 163.35mm; /* Section A ends here */
            left: 19mm;
            right: 15mm;
            height: 2mm;
            background: var(--ptc-gold);
            z-index: 100;
        }
        /* Section B: Transmission - Bottom 45% */
        .section-b {
            position: absolute;
            top: 175.35mm; /* After divider (163.35 + 2mm divider + 10mm gap) */
            left: 19mm;
            right: 15mm;
            bottom: 15mm;
            z-index: 100;
        }
        /* Section B Header - Right Aligned */
        .section-b-header {
            font-family: 'Oswald', sans-serif;
            font-weight: 900;
            font-size: 68px;
            color: var(--ptc-gold);
            line-height: 0.9;
            margin-bottom: 12mm;
            text-transform: uppercase;
            letter-spacing: -0.01em;
            text-align: right;
        }
        /* Section B Content Grid */
        .section-b-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15mm;
            height: calc(100% - 80px);
        }
        /* Product Visual Left */
        .product-visual-left {
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.85;
            z-index: 5;
        }
        /* Brand Wall Right - 2 rows x 2 columns */
        .brand-wall-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12mm;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- Yellow Strip on Left Edge -->
        <div class="yellow-strip"></div>
        
        <!-- Textures -->
        <div class="texture-overlay"></div>
        <div class="tech-grid"></div>
        
        <!-- Section A: Engine & Turbo (Top 55%) -->
        <div class="section-a">
            <h1 class="section-a-header">ENGINE & TURBO</h1>
            
            <!-- Brand Wall - 2 rows x 3 columns -->
            <div class="brand-wall-3col">
                <div class="logo-container">
                    <img src="/catalogue-2025/images/logos/brands/Isuzu.svg" alt="Isuzu" class="logo-item-large">
                </div>
                <div class="logo-container">
                    <img src="/catalogue-2025/images/logos/brands/mahle.png" alt="Mahle" class="logo-item-large">
                </div>
                <div class="logo-container">
                    <img src="/catalogue-2025/images/logos/brands/ks-450-logo.png" alt="KS Kolbenschmidt" class="logo-item-large">
                </div>
                <div class="logo-container">
                    <img src="/catalogue-2025/images/logos/brands/garrett-logo-png_seeklogo-489181.png" alt="Garrett" class="logo-item-large">
                </div>
                <div class="logo-container">
                    <img src="/catalogue-2025/images/logos/brands/IHI.jpeg" alt="IHI" class="logo-item-large">
                </div>
                <div class="logo-container">
                    <img src="/catalogue-2025/images/logos/brands/schitzer.png" alt="BorgWarner" class="logo-item-large">
                </div>
            </div>
            
            <!-- Parts List -->
            <div class="parts-list">
                Pistons • Liners • Rings • Turbochargers • Overhaul Kits
            </div>
            
            <!-- Product Visual - Bottom Right -->
            <img src="/catalogue-2025/images/products/Piston.png" alt="Piston" class="product-visual">
        </div>
        
        <!-- Yellow Divider Line -->
        <div class="yellow-divider"></div>
        
        <!-- Section B: Transmission & Drivetrain (Bottom 45%) -->
        <div class="section-b">
            <h1 class="section-b-header">TRANSMISSION & DRIVETRAIN</h1>
            
            <div class="section-b-content">
                <!-- Product Visual Left -->
                <div style="position: relative;">
                    <img src="/catalogue-2025/images/products/Transmission Gears.png" alt="Transmission" class="product-visual-left">
                </div>
                
                <!-- Brand Wall Right - 2 rows x 2 columns -->
                <div>
                    <div class="brand-wall-2col">
                        <div class="logo-container">
                            <img src="/catalogue-2025/images/logos/brands/spicer-parts-logo-png_seeklogo-409478.png" alt="Dana Spicer" class="logo-item-large">
                        </div>
                        <div class="logo-container">
                            <img src="/catalogue-2025/images/logos/brands/LuK_logo.svg.png" alt="LuK" class="logo-item-large">
                        </div>
                        <div class="logo-container">
                            <img src="/catalogue-2025/images/logos/brands/INA_logo.svg" alt="INA" class="logo-item-large">
                        </div>
                        <div class="logo-container">
                            <img src="/catalogue-2025/images/logos/brands/dayco-vector-logo.png" alt="Dayco" class="logo-item-large">
                        </div>
                    </div>
                    
                    <!-- Parts List -->
                    <div class="parts-list" style="margin-top: 8mm; text-align: right;">
                        Axles • Gears • Clutches • Bearings • Tensioners
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
