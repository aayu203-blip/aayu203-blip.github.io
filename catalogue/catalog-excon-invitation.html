<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PTC - EXCON 2025 Invitation</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- PRINT SETTINGS --- */
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background: none;
            }
            .invitation-container {
                box-shadow: none;
                margin: 0;
            }
        }
        @media screen {
            body {
                background-color: #555; /* Grey background for better contrast */
            }
        }
        /* --- GLOBAL VARS --- */
        :root {
            --ptc-gold: #DA9100;
            --dark-bg: #000000;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* WhatsApp Invitation Container - 1:1 (1080 x 1080 pixels) */
        .invitation-container {
            width: 1080px;
            height: 1080px;
            background-color: #000000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Technical Grid */
        .tech-grid {
            position: absolute;
            inset: 0;
            background-size: 40px 40px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
            pointer-events: none;
            z-index: 5;
            opacity: 0.06; /* 5-7% opacity */
            mix-blend-mode: normal;
        }
        
        /* Background Image with Fades */
        .background-image {
            position: absolute;
            inset: 0;
            background-image: url('/catalogue-2025/images/Untitled%20design%20(10).png');
            background-size: cover;
            background-position: right top; /* Align right - bucket + action in upper right quadrant */
            background-repeat: no-repeat;
            z-index: 1;
        }
        /* Left fade - covers ~40% from left */
        .fade-left {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to right,
                rgba(0, 0, 0, 0.85) 0%,
                rgba(0, 0, 0, 0.70) 25%,
                rgba(0, 0, 0, 0.50) 35%,
                rgba(0, 0, 0, 0.25) 40%,
                transparent 50%
            );
            z-index: 2;
            pointer-events: none;
        }
        /* Bottom fade - covers 25-30% from bottom */
        .fade-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28%; /* 25-30% from bottom */
            background: linear-gradient(
                to top,
                rgba(0, 0, 0, 0.90) 0%,
                rgba(0, 0, 0, 0.70) 40%,
                rgba(0, 0, 0, 0.40) 70%,
                transparent 100%
            );
            z-index: 3;
            pointer-events: none;
        }
        
        /* Header Section */
        .header-section {
            height: 140px;
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 60px 80px 0 80px; /* 80px safe area on all sides */
        }
        /* PTC Logo */
        .logo-wrapper {
            display: flex;
            align-items: flex-start;
        }
        .logo-image {
            width: 400px; /* Even bigger logo */
            height: auto;
            object-fit: contain;
            /* Filter to change yellow to #DA9100 */
            filter: hue-rotate(-15deg) saturate(1.1);
        }
        /* Heritage Block - Right Side */
        .heritage-block {
            text-align: right;
        }
        .heritage-heavy-duty {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 54px;
            color: #FFFFFF;
            line-height: 0.9; /* 90% */
            margin: 0;
            padding: 0;
            text-transform: uppercase;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }
        .heritage-legacy {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 64px;
            color: var(--ptc-gold); /* PTC Gold */
            line-height: 0.9; /* 90% */
            margin: 0;
            padding: 0;
            text-transform: uppercase;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }
        .heritage-since {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 26px;
            color: #FFFFFF;
            line-height: 0.9;
            letter-spacing: 0.1em; /* +10% tracking */
            margin-top: 4px;
            text-transform: uppercase;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }
        
        /* Main Headline Block */
        .headline-block {
            position: absolute;
            left: 80px;
            top: 320px; /* 310-340px range, using 320px */
            z-index: 10;
        }
        .headline-text {
            font-family: 'Oswald', sans-serif;
            font-weight: 900; /* Heavy */
            font-size: 64px; /* Match HEAVY DUTY LEGACY size (64px) */
            line-height: 0.9; /* 88-92% range */
            color: #FFFFFF;
            letter-spacing: -0.02em;
            margin: 0;
            padding: 0;
        }
        .headline-text .parts-line {
            font-size: 64px; /* Same size - match LEGACY. size */
        }
        .headline-text .gold {
            color: var(--ptc-gold);
        }
        
        /* Invitation Block */
        .invitation-block {
            position: absolute;
            left: 80px;
            top: 720px; /* 46-54px below headline (headline ends ~670px, so 720px = 50px spacing) */
            z-index: 10;
        }
        .invitation-text {
            font-family: 'Inter', sans-serif;
            font-weight: 600; /* Semibold */
            font-size: 36px;
            color: #EAEAEA;
            line-height: 1.3; /* 130% */
            margin: 0;
            padding: 0;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }
        .invitation-text p {
            margin: 0 0 4px 0;
        }
        .invitation-text p:last-child {
            margin-bottom: 0;
        }
        .small-caps {
            font-variant: small-caps;
        }
        .invitation-bullet {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--ptc-gold);
            border-radius: 50%;
            margin: 0 12px;
            vertical-align: middle;
        }
        
        /* Website - Bottom Left */
        .website-section {
            position: absolute;
            bottom: 80px;
            left: 80px;
            z-index: 10;
        }
        .website-text {
            font-family: 'Inter', sans-serif; /* Back to original font */
            font-weight: 600; /* Semibold - original */
            font-size: 32px; /* Original size */
            color: rgba(218, 145, 0, 0.80); /* Yellow with 80% opacity */
            text-align: left;
            margin: 0;
            padding: 0;
        }
        
        /* Equipment Section - Bottom */
        .equipment-section {
            position: absolute;
            bottom: 80px;
            right: 80px;
            z-index: 10;
            text-align: right;
        }
        .equipment-list {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 22px;
            color: #E6E6E6;
            line-height: 1.4;
        }
        .equipment-list span {
            display: block;
            margin-bottom: 4px;
        }
        .equipment-list span:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="invitation-container">
        <!-- Background Image -->
        <div class="background-image"></div>
        <div class="fade-left"></div>
        <div class="fade-bottom"></div>
        
        <!-- Technical Grid -->
        <div class="tech-grid"></div>
        
        <!-- Header Section -->
        <div class="header-section">
            <!-- Left - PTC Logo -->
            <div class="logo-wrapper">
                <img src="/catalogue-2025/images/logos/ptc-logo.png" alt="PTC Parts Trading Company" class="logo-image">
            </div>
            
            <!-- Right - Heritage Block -->
            <div class="heritage-block">
                <div class="heritage-heavy-duty">HEAVY DUTY</div>
                <div class="heritage-legacy">LEGACY.</div>
                <div class="heritage-since">SINCE 1956</div>
            </div>
        </div>
        
        <!-- Main Headline Block -->
        <div class="headline-block">
            <h1 class="headline-text">
                IF YOU HAVE<br>
                <span class="gold">EARTHMOVERS</span>,<br>
                WE HAVE<br>
                <span class="gold parts-line">PARTS.</span>
            </h1>
        </div>
        
        <!-- Invitation Block -->
        <div class="invitation-block">
            <div class="invitation-text">
                <p>Visit <span class="small-caps">Us</span> at EXCON 2025</p>
                <p>
                    Hall 5 LL <span class="invitation-bullet"></span> Stall B 22
                </p>
                <p>
                    9–13 December <span class="invitation-bullet"></span> Bengaluru
                </p>
            </div>
        </div>
        
        <!-- Website - Bottom Left -->
        <div class="website-section">
            <p class="website-text">www.partstrading.com</p>
        </div>
        
        <!-- Equipment Section - Bottom Right -->
        <div class="equipment-section">
            <div class="equipment-list">
                <span>Volvo</span>
                <span>Scania</span>
                <span>Komatsu</span>
                <span>Caterpillar</span>
                <span>Hitachi</span>
                <span>Kobelco</span>
                <span>Hyundai</span>
                <span>SANY</span>
                <span>Liugong</span>
            </div>
        </div>
    </div>
</body>
</html>
